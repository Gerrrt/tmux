# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# General
set -g set-clipboard on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g mouse on
set -g status-interval 3
set -g allow-passthrough on
set -g set-titles on

# Set Prefix Key
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Refresh tmux config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Split Horizontally 
unbind %
bind | split-window -h -c "#{pane_current_path}"

# Split Vertically
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Use vim arrow keys to resize
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Use m key to maximize pane
bind -r m resize-pane -Z

# Enable vi mode to move around in copy mode (Prefix + [)
set-window-option -g mode-keys vi

# Select text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy text with "y"
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste yanked text with "Prefix + P"
bind P paste-buffer

# Swap windows
 bind -r S-Left run 'tmux swap-window -d -t #{e|-|:#I,1}'
 bind -r S-Right run 'tmux swap-window -d -t #{e|+|:#I,1}'

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set-window-option -g pane-base-index 1

# Alt+hjkl to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Dracula theme colors
thm_bg="#282a36" # Very Dark Blue
thm_line="#44475a" # Grey
thm_selection="#44475a" # Grey
thm_fg="#f8f8f2" # White
thm_comment="#6272a4" # Dark Blue
thm_cyan="#8be9fd"
thm_green="#50fa7b"
thm_orange="#ffb86c"
thm_pink="#ff79c6"
thm_purple="#bd93f9"
thm_red="#ff5555"
thm_yellow="#f1fa8c"

# Resurrect
set -g @resurrect-capture-pane-context 'on'

# Status
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-position bottom

# Messages
set -g message-style "fg=${thm_comment},bg=${thm_bg},align=centre"
set -g message-command-style "fg=${thm_comment},bg=${thm_bg},align=centre"

# Panes
set -g pane-border-style "fg=${thm_green}"
set -g pane-active-border-style "fg=${thm_purple}"

# Windows
set -g window-status-activity-style "fg=${thm_comment},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_comment},bg=${thm_bg},none"

# Statusline - Other Windows
set -g window-status-format "#[fg=${thm_comment},bg=${thm_line}] #I: #[fg=${thm_comment},bg=${thm_bg}] #W "

# Statusline - Current Window
set -g window-status-current-format "#[fg=${thm_bg},bg=${thm_green}] #I: #[fg=${thm_comment},bg=${thm_bg}] #W "

set -g status-right "#[fg=${thm_bg},bg=${thm_cyan},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_cyan},nobold,nounderscore,noitalics]  #[fg=${thm_comment},bg=${thm_bg}] #W #[fg=${thm_bg},bg=${thm_pink},nobold,nounderscore,noitalics]#[bg=${thm_pink},fg=${thm_bg}]  #[fg=${thm_comment},bg=${thm_bg}] #S #[fg=${thm_bg},bg=${thm_purple},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_purple},nobold,nounderscore,noitalics] 󰃰 #[fg=${thm_comment},bg=${thm_bg}] %B-%d-%Y %H:%M "

set -g status-left "#[fg=${thm_bg},bg=${thm_red}]#[fg=${thm_bg},bg=${thm_red}] 󰒋 #[fg=${thm_comment},bg=${thm_bg}] #H #[fg=${thm_bg},bg=${thm_orange}]#[fg=${thm_bg},bg=${thm_orange}]  #[fg=${thm_comment},bg=${thm_bg}] #(whoami) #[fg=${thm_bg},bg=${thm_yellow},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_yellow}]  #[fg=${thm_comment},bg=${thm_bg}] #(pwd) "

set -g clock-mode-colour "${thm_cyan}"
set -g mode-style "fg=${thm_cyan} bg=${thm_bg} bold"
